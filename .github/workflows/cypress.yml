# ─── .github/workflows/cypress.yml ──────────────────────────────────────────
# CI/CD pipeline — runs Cypress test suites on push/PR, uploads artifacts,
# and posts a test summary to the GitHub Actions summary page.

name: 🧪 Cypress QA Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run full suite nightly at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Which suite to run"
        required: false
        default: "all"
        type: choice
        options: [all, auth, ecommerce, api, todo]

env:
  CYPRESS_STANDARD_USER: ${{ secrets.CYPRESS_STANDARD_USER }}
  CYPRESS_PASSWORD:       ${{ secrets.CYPRESS_PASSWORD }}

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── Job 2: Parallel Test Suites ─────────────────────────────────────────────
  test:
    name: 🧪 ${{ matrix.suite }} Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false  # run all suites even if one fails
      matrix:
        suite: [auth, ecommerce, api, todo]
        include:
          - suite: auth
            spec: "cypress/e2e/auth/**"
          - suite: ecommerce
            spec: "cypress/e2e/ecommerce/**"
          - suite: api
            spec: "cypress/e2e/api/**"
          - suite: todo
            spec: "cypress/e2e/todo/**"

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run ${{ matrix.suite }} suite
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
          spec: ${{ matrix.include.spec }}
          config: "video=true"
        env:
          CYPRESS_STANDARD_USER: ${{ secrets.CYPRESS_STANDARD_USER }}
          CYPRESS_PASSWORD:       ${{ secrets.CYPRESS_PASSWORD }}

      - name: 📸 Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.suite }}
          path: cypress/screenshots
          retention-days: 7

      - name: 🎥 Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.suite }}
          path: cypress/videos
          retention-days: 7

      - name: 📊 Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-reports-${{ matrix.suite }}
          path: cypress/reports
          retention-days: 14

  # ── Job 3: Summary ───────────────────────────────────────────────────────────
  summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🧪 Cypress Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E-Commerce | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Todo | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕒 Run triggered by: **${{ github.event_name }}**" >> $GITHUB_STEP_SUMMARY
